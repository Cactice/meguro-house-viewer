　🟥🟥⬜⬜⬜⬜🟫🟫🟫🟫🟫🟫
　🟥🟥⬜⬜⬜⬜🟫🟫🟫🟫🟫🟫
　🟨🟨🟨🟨⬜⬜🟫🟫🟫🟫🟫🟫
　🟨🟨🟨🟨⬜⬜🟫🟫🟫🟫🟫🟫
🟦🟦🟦🟦🟦⬜⬜🟫🟫🟫🟫🟫🟫
🟦🟦🟦🟦🟦⬜⬜🟫🟫🟫🟫🟫🟫
🟦🟦🟦🟦🟦🟪🟪🟪🟪🟪🟪🟪🟪
